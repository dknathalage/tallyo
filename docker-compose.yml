services:
  invoices:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - invoices-data:/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/database.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  invoices-data:
    driver: local
