name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3) — must already exist'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage summary
        id: coverage
        run: |
          LINE=$(grep "All files" coverage-output.txt | tail -1)
          echo "statements=$(echo "$LINE" | awk '{print $4}')" >> $GITHUB_OUTPUT
          echo "branch=$(echo "$LINE"    | awk '{print $6}')" >> $GITHUB_OUTPUT
          echo "functions=$(echo "$LINE" | awk '{print $8}')" >> $GITHUB_OUTPUT
          echo "lines=$(echo "$LINE"     | awk '{print $10}')" >> $GITHUB_OUTPUT

      - name: Count tests
        id: tests
        run: |
          COUNT=$(npm test 2>&1 | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+" | head -1)
          echo "count=${COUNT:-0}" >> $GITHUB_OUTPUT

      - name: Build release notes
        env:
          TEST_COUNT: ${{ steps.tests.outputs.count }}
          COVERAGE_STMTS: ${{ steps.coverage.outputs.statements }}
          COVERAGE_FUNCS: ${{ steps.coverage.outputs.functions }}
          COVERAGE_BRANCH: ${{ steps.coverage.outputs.branch }}
          COVERAGE_LINES: ${{ steps.coverage.outputs.lines }}
        run: python3 scripts/build-release-notes.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body_path: RELEASE_NOTES.md
          make_latest: true
