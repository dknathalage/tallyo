name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT or the default token with write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage summary
        id: coverage
        run: |
          LINE=$(grep "All files" coverage-output.txt | tail -1)
          echo "statements=$(echo "$LINE" | awk '{print $4}')" >> $GITHUB_OUTPUT
          echo "branch=$(echo "$LINE"    | awk '{print $6}')" >> $GITHUB_OUTPUT
          echo "functions=$(echo "$LINE" | awk '{print $8}')" >> $GITHUB_OUTPUT
          echo "lines=$(echo "$LINE"     | awk '{print $10}')" >> $GITHUB_OUTPUT

      - name: Count tests
        id: tests
        run: |
          COUNT=$(npm test 2>&1 | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+" | head -1)
          echo "count=${COUNT:-0}" >> $GITHUB_OUTPUT

      - name: Semantic Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          npx semantic-release 2>&1 | tee /tmp/sr-output.txt
          # Capture the released version if any
          VERSION=$(grep -oE "Published release [0-9]+\.[0-9]+\.[0-9]+" /tmp/sr-output.txt | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1 || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "released=$([ -n "$VERSION" ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Append quality report to release
        if: steps.release.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: v${{ steps.release.outputs.version }}
          TEST_COUNT: ${{ steps.tests.outputs.count }}
          COVERAGE_STMTS: ${{ steps.coverage.outputs.statements }}
          COVERAGE_FUNCS: ${{ steps.coverage.outputs.functions }}
          COVERAGE_BRANCH: ${{ steps.coverage.outputs.branch }}
          COVERAGE_LINES: ${{ steps.coverage.outputs.lines }}
        run: python3 scripts/append-quality-report.py
