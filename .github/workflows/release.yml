name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage summary
        id: coverage
        run: |
          LINE=$(grep "All files" coverage-output.txt | tail -1)
          echo "statements=$(echo "$LINE" | awk '{print $4}')" >> $GITHUB_OUTPUT
          echo "branch=$(echo "$LINE"    | awk '{print $6}')" >> $GITHUB_OUTPUT
          echo "functions=$(echo "$LINE" | awk '{print $8}')" >> $GITHUB_OUTPUT
          echo "lines=$(echo "$LINE"     | awk '{print $10}')" >> $GITHUB_OUTPUT

      - name: Count tests
        id: tests
        run: |
          COUNT=$(npm test 2>&1 | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+" | head -1)
          echo "count=${COUNT:-0}" >> $GITHUB_OUTPUT

      - name: Install git-cliff
        run: |
          VERSION=$(curl -s https://api.github.com/repos/orhun/git-cliff/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/${VERSION}/git-cliff-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin git-cliff-x86_64-unknown-linux-musl/git-cliff
          git-cliff --version

      - name: Generate changelog
        run: git-cliff --latest --strip header -o CHANGELOG_RELEASE.md

      - name: Build release notes
        env:
          TEST_COUNT: ${{ steps.tests.outputs.count }}
          STMTS: ${{ steps.coverage.outputs.statements }}
          FUNCS: ${{ steps.coverage.outputs.functions }}
          BRANCH: ${{ steps.coverage.outputs.branch }}
          LINES: ${{ steps.coverage.outputs.lines }}
        run: |
          python3 - <<'EOF'
          import os

          changelog = open('CHANGELOG_RELEASE.md').read().strip()
          test_count = os.environ.get('TEST_COUNT', 'N/A')
          stmts  = os.environ.get('STMTS',  'N/A')
          funcs  = os.environ.get('FUNCS',  'N/A')
          branch = os.environ.get('BRANCH', 'N/A')
          lines  = os.environ.get('LINES',  'N/A')

          notes = f"""{changelog}

---

## 🧪 Quality Report

| Metric | Value |
|--------|-------|
| ✅ Tests passing | **{test_count}** |
| 📊 Statement coverage | {stmts}% |
| 📊 Function coverage | {funcs}% |
| 📊 Branch coverage | {branch}% |
| 📊 Line coverage | {lines}% |

## 🚀 Quick Start

```bash
git clone https://github.com/dknathalage/invoices.git
cd invoices
npm install && npm run build
PORT=3002 HOST=0.0.0.0 node build/index.js
```

Database auto-created at `~/.invoices/invoices.db` on first run.

## 🏥 Health Check

```
GET /health → {{"status":"ok","db":"connected"}}
```
"""

          open('RELEASE_NOTES.md', 'w').write(notes)
          print("Release notes written successfully.")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          make_latest: true
