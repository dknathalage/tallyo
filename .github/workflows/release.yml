name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3) — must already exist'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Svelte type check
        run: npx turbo run check

      - name: Run tests
        run: npx turbo run test

      - name: Build
        run: npx turbo run build

      - name: Run coverage
        run: npm run --workspace=@tallyo/app test:coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage summary
        id: coverage
        run: |
          LINE=$(grep "All files" coverage-output.txt | tail -1)
          echo "statements=$(echo "$LINE" | awk '{print $4}')" >> $GITHUB_OUTPUT
          echo "branch=$(echo "$LINE"    | awk '{print $6}')" >> $GITHUB_OUTPUT
          echo "functions=$(echo "$LINE" | awk '{print $8}')" >> $GITHUB_OUTPUT
          echo "lines=$(echo "$LINE"     | awk '{print $10}')" >> $GITHUB_OUTPUT

      - name: Count tests
        id: tests
        run: |
          COUNT=$(npm run --workspace=@tallyo/app test 2>&1 | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+" | head -1)
          echo "count=${COUNT:-0}" >> $GITHUB_OUTPUT

      - name: Build release notes
        env:
          TEST_COUNT: ${{ steps.tests.outputs.count }}
          COVERAGE_STMTS: ${{ steps.coverage.outputs.statements }}
          COVERAGE_FUNCS: ${{ steps.coverage.outputs.functions }}
          COVERAGE_BRANCH: ${{ steps.coverage.outputs.branch }}
          COVERAGE_LINES: ${{ steps.coverage.outputs.lines }}
        run: python3 scripts/build-release-notes.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body_path: RELEASE_NOTES.md
          make_latest: true
