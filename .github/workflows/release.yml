name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage summary
        id: coverage
        run: |
          # v8 coverage table format:
          # All files  |  25.08 |  28.40 |  29.27 |  26.88 |
          # Fields (awk whitespace split): All(1) files(2) |(3) stmts(4) |(5) branch(6) |(7) funcs(8) |(9) lines(10) |(11)
          LINE=$(grep "All files" coverage-output.txt | tail -1)
          echo "coverage line: $LINE"
          STMTS=$(echo "$LINE" | awk '{print $4}')
          BRANCH=$(echo "$LINE" | awk '{print $6}')
          FUNCS=$(echo "$LINE" | awk '{print $8}')
          LINES=$(echo "$LINE" | awk '{print $10}')
          echo "statements=${STMTS:-N/A}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH:-N/A}" >> $GITHUB_OUTPUT
          echo "functions=${FUNCS:-N/A}" >> $GITHUB_OUTPUT
          echo "lines=${LINES:-N/A}" >> $GITHUB_OUTPUT

      - name: Count tests
        id: tests
        run: |
          COUNT=$(npm test 2>&1 | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+" | head -1)
          echo "count=${COUNT:-0}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Build release notes
        env:
          TEST_COUNT: ${{ steps.tests.outputs.count }}
          STMTS: ${{ steps.coverage.outputs.statements }}
          FUNCS: ${{ steps.coverage.outputs.functions }}
          BRANCH: ${{ steps.coverage.outputs.branch }}
          LINES: ${{ steps.coverage.outputs.lines }}
        run: |
          python3 - <<'EOF'
          import os

          changelog = open('CHANGELOG_RELEASE.md').read().strip()
          test_count = os.environ['TEST_COUNT']
          stmts     = os.environ['STMTS']
          funcs     = os.environ['FUNCS']
          branch    = os.environ['BRANCH']
          lines     = os.environ['LINES']

          notes = f"""{changelog}

          ---

          ## 🧪 Quality Report

          | Metric | Value |
          |--------|-------|
          | ✅ Tests passing | **{test_count}** |
          | 📊 Statement coverage | {stmts}% |
          | 📊 Function coverage | {funcs}% |
          | 📊 Branch coverage | {branch}% |
          | 📊 Line coverage | {lines}% |

          ## 🚀 Quick Start

          ```bash
          git clone https://github.com/dknathalage/invoices.git
          cd invoices
          npm install && npm run build
          PORT=3002 HOST=0.0.0.0 node build/index.js
          ```

          Database auto-created at `~/.invoices/invoices.db` on first run.

          ## 🏥 Health Check

          ```
          GET /health → {{"status":"ok","db":"connected"}}
          ```
          """

          open('RELEASE_NOTES.md', 'w').write(notes)
          print("Release notes written.")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          make_latest: true
