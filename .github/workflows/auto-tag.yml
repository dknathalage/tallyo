name: Auto Tag

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    # Only tag when CI succeeds on a push (not PRs), and skip bot commits
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Determine version bump
        id: bump
        run: |
          MSG="${{ github.event.workflow_run.head_commit.message }}"
          echo "Commit: $MSG"

          if echo "$MSG" | grep -qE "BREAKING[- ]CHANGE|!:"; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE "^feat(\(.+\))?!?:"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE "^(fix|perf|revert)(\(.+\))?:"; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"

          # Get latest semver tag
          LATEST=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -1 || echo "v0.0.0")
          echo "Latest tag: $LATEST"

          MAJOR=$(echo "${LATEST#v}" | cut -d. -f1)
          MINOR=$(echo "${LATEST#v}" | cut -d. -f2)
          PATCH=$(echo "${LATEST#v}" | cut -d. -f3)

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Creating tag: $NEW_TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "✓ Tagged $NEW_TAG"
