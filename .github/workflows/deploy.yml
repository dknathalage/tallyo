name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run docs:build
      # Assemble deploy directory
      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/console
          cp -r src/docs/.vitepress/dist/* deploy/
          cp -r build/* deploy/console/
          touch deploy/.nojekyll
          cat > deploy/404.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8" />
              <title>Redirecting...</title>
              <script>
                // GitHub Pages SPA redirect for /invoices/console/* routes
                var path = window.location.pathname;
                if (path.startsWith('/invoices/console')) {
                  sessionStorage.setItem('spa-redirect', path + window.location.search);
                  window.location.replace('/invoices/console/');
                }
              </script>
            </head>
            <body></body>
          </html>
          HTMLEOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
