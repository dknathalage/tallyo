name: release-please

# Release automation. On every push to main, release-please maintains a "release
# PR" that rolls up Conventional Commits into CHANGELOG.md + a version bump.
# Merging that PR cuts the v* tag and a GitHub Release. Tallyo is distributed
# source-only, so no binaries are built — users clone and `go build .`.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
