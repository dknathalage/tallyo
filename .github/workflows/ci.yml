name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Svelte type check
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Test with coverage
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "Commit: $MSG"

          if echo "$MSG" | grep -qE "BREAKING[- ]CHANGE|!:"; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE "^feat(\(.+\))?!?:"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE "^(fix|perf|revert)(\(.+\))?:"; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"

          # Get latest semver tag
          LATEST=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -1 || echo "v0.0.0")
          echo "Latest tag: $LATEST"

          MAJOR=$(echo "${LATEST#v}" | cut -d. -f1)
          MINOR=$(echo "${LATEST#v}" | cut -d. -f2)
          PATCH=$(echo "${LATEST#v}" | cut -d. -f3)

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Creating tag: $NEW_TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "✓ Tagged $NEW_TAG"
