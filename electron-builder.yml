appId: com.tallyo.app
productName: Tallyo
directories:
  output: dist-electron
files:
  - electron/**
  - build/**
  - drizzle/**
  - package.json
  - "!**/*.{md,map,ts}"
# Unpack everything the SvelteKit server bundle reaches at runtime.
# adapter-node externalizes node_modules, so the unpacked build/ chunks
# do `import 'drizzle-orm'` and Node's ESM resolver cannot cross the
# asar boundary from app.asar.unpacked back into app.asar.
asarUnpack:
  - node_modules/**
  - drizzle/**
  - build/**
mac:
  target: dmg
  category: public.app-category.finance
  icon: electron/assets/icon.png
win:
  target: nsis
  icon: electron/assets/icon.png
linux:
  target: AppImage
  icon: electron/assets/icon.png
