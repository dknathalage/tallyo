version: "2"
sql:
  - engine: "postgresql"
    # Schema for type generation only (runtime DB selection is the repo's job).
    # Read the whole control dir (its audit_log is the single AuditLog model) and
    # the tenant business-table migration EXPLICITLY — the tenant audit_log file
    # (00002_audit_log.sql) is deliberately omitted to avoid a duplicate-table
    # error; goose still applies it to tenant DBs. See the DB-per-tenant plan.
    schema:
      - "internal/db/migrations/control"
      - "internal/db/migrations/tenant/00001_tenant.sql"
      - "internal/db/migrations/tenant/00003_catalogue.sql"
      - "internal/db/migrations/tenant/00004_catalogue_tenant.sql"
      - "internal/db/migrations/tenant/00005_catalogue_merge.sql"
    queries: "internal/db/queries"
    gen:
      go:
        package: "gen"
        out: "internal/db/gen"
        emit_json_tags: true
        emit_interface: true
        # Keep INTEGER columns (used as bools/version/sort_order) mapped to
        # int64 as under the old sqlite engine — Postgres' integer would
        # otherwise default to int32 and churn every Go call site. The DDL stays
        # INTEGER; only the Go representation is pinned.
        overrides:
          - db_type: "pg_catalog.int4"
            go_type: "int64"
          - db_type: "pg_catalog.int4"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullInt64"
