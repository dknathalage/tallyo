version: "3"

dotenv: [".env"]

vars:
  BINARY: bin/tallyo

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the cgo-free single binary (SPA first)
    cmds:
      - task: build:web
      - task: build:go

  dev:
    desc: Run backend + frontend (hot reload, LAN-exposed)
    deps: [dev:go, dev:web]

  test:
    desc: Run Go tests (-race)
    cmds:
      - go test -race ./...

  lint:
    desc: Full quality gate (vet, gofmt, test, svelte-check)
    cmds:
      - go vet ./...
      - test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - go test -race ./...
      - npm --prefix web run check

  sqlc:
    desc: Regenerate internal/db/gen from queries/*.sql
    cmds:
      - '"$(go env GOPATH)/bin/sqlc" generate'

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin
      - rm -rf web/build

  # --- internal helpers (hidden from --list) ---

  build:web:
    dir: web
    cmds:
      - npm install
      - npm run build

  build:go:
    cmds:
      - CGO_ENABLED=0 go build -o {{.BINARY}} ./cmd/tallyo

  dev:go:
    cmds:
      - go run ./cmd/tallyo

  dev:web:
    dir: web
    cmds:
      - npm run dev -- --host
