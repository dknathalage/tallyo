version: "3"

dotenv: [".env"]

vars:
  BINARY: bin/tallyo
  PROJECT: tallyo-saas
  REGION: australia-southeast1
  REPO: "{{.REGION}}-docker.pkg.dev/{{.PROJECT}}/tallyo/tallyo"
  IMAGE: "{{.REPO}}:latest"
  SHA:
    sh: git rev-parse --short HEAD

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the cgo-free single binary (SPA first)
    cmds:
      - task: build:web
      - task: build:go

  dev:
    desc: Run backend + frontend (hot reload, LAN-exposed)
    deps: [dev:go, dev:web]

  test:unit:
    desc: Run Go tests (-race)
    cmds:
      - go test -race ./...

  test:e2e:
    desc: Run Playwright e2e (boots the real binary)
    cmds:
      - npm --prefix web run test:e2e

  test:
    desc: Run Go unit tests then Playwright e2e
    deps: [test:unit, test:e2e]

  lint:
    desc: Full quality gate (vet, gofmt, test, svelte-check)
    cmds:
      - go vet ./...
      - test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - go test -race ./...
      - npm --prefix web run check

  sqlc:
    desc: Regenerate internal/db/gen from queries/*.sql
    cmds:
      - '"$(go env GOPATH)/bin/sqlc" generate'

  build:web:
    deps: [build:web:install]
    dir: web
    sources:
      - src/**/*
      - static/**/*
      - package.json
      - svelte.config.js
      - vite.config.*
      - tsconfig.json
      - "**/*.css"
    generates:
      - build/**/*
    cmds:
      - npm run build

  build:web:install:
    dir: web
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm ci

  build:go:
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - web/build/**/*
    generates:
      - "{{.BINARY}}"
    # deterministic: -trimpath strips local paths, -buildid= zeroes the build id
    cmds:
      - CGO_ENABLED=0 go build -trimpath -ldflags=-buildid= -o {{.BINARY}} ./cmd/tallyo

  run:
    deps: [build:go, build:web]
    cmds:
      - PID=$(lsof -t -i :8080 || true); test -n "$PID" && kill -9 $PID || true
      - ./{{.BINARY}}

  # --- deploy --------------------------------------------------------------
  # Infra applies that touch Google sign-in need the OAuth client secret in a
  # gitignored .env at the repo root:  GOOGLE_OAUTH_CLIENT_SECRET=GOCSPX-...

  image:
    desc: Build amd64 binary on host (SPA embedded), copy into runtime image, push
    deps: [build:web]
    cmds:
      # cross-compile amd64 for Cloud Run; SPA embedded via go:embed (needs build:web first)
      - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -buildid=" -o bin/tallyo-linux-amd64 ./cmd/tallyo
      - gcloud auth print-access-token | podman login -u oauth2accesstoken --password-stdin {{.REGION}}-docker.pkg.dev
      - podman build --platform=linux/amd64 -t {{.REPO}}:{{.SHA}} -t {{.IMAGE}} .
      - podman push {{.REPO}}:{{.SHA}}
      - podman push {{.IMAGE}}

  deploy:
    desc: Build the image, then roll all envs (prd, stg, dev)
    cmds:
      - task: image
      - task: "deploy:dev"
      - task: "deploy:stg"
      - task: "deploy:prd"

  deploy:*:
    desc: Roll one env to the current commit's image (e.g. `task deploy:prd`)
    vars: { ENV: "{{index .MATCH 0}}" }
    cmds:
      - gcloud run services update tallyo-{{.ENV}} --image {{.REPO}}:{{.SHA}} --region {{.REGION}} --project {{.PROJECT}}

  infra:plan:
    desc: Plan all infra (no writes)
    dir: infra/live
    cmds:
      - terragrunt run --all plan

  infra:apply:
    desc: Apply all infra (needs GOOGLE_OAUTH_CLIENT_SECRET in .env)
    dir: infra/live
    cmds:
      - terragrunt run --all apply
