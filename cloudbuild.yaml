# Build + push the Tallyo image. BuildKit (DOCKER_BUILDKIT=1) is required because
# the Dockerfile relies on the buildx-provided $BUILDPLATFORM/$TARGETARCH args;
# the legacy `gcloud builds submit --tag` builder leaves them empty.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    env: ['DOCKER_BUILDKIT=1']
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/tallyo-saas/tallyo/tallyo:latest'
      - '.'
images:
  - 'australia-southeast1-docker.pkg.dev/tallyo-saas/tallyo/tallyo:latest'
options:
  machineType: 'E2_HIGHCPU_8'
